[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "dclaborsupply"
version = "0.1.0"
description = "Skeleton core package for discrete-choice labour-supply models."
requires-python = ">=3.10"
license = { text = "MIT" }
dependencies = [
  "numpy",
  "pandas",
  "pyyaml",
]

[project.optional-dependencies]
jax = ["jax", "optax"]
gamspy = ["gamspy"]
# SciPy L-BFGS-B optimizer (solvers/jax_optimize.py). Needs jax too: the objective
# is the JAX joint negLL with jax.grad jacobian -> install dclaborsupply[jax,solver].
# optimistix is a further-optional pure-JAX polish (not listed; pip install separately).
solver = ["scipy"]
# Parquet-PATH loading in data/loader.py needs a pandas parquet engine. The DataFrame
# APIs (load_singles/load_couples with a DataFrame) work with base numpy+pandas only;
# reading a parquet path / load_engine_ready_stem requires this extra:
#   pip install dclaborsupply[parquet]
parquet = ["pyarrow"]
dev = ["pytest", "ruff"]

[project.scripts]
dcls = "dclaborsupply.cli:main"

[tool.setuptools.packages.find]
where = ["src"]
